<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KVS CBSE Class 12 Result Analyser</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#eef2f7,#d9e4f5);
}

.header{
    background:#7a0019;
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.logo{
    width:70px;
    height:70px;
    margin-right:15px;
}

.title{
    font-size:28px;
    font-weight:bold;
}

.subtitle{
    font-size:15px;
    opacity:0.9;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

h2{
    color:#7a0019;
    margin-bottom:20px;
}

input[type="file"]{
    margin-top:10px;
    padding:12px;
    width:100%;
    border:1px solid #ccc;
    border-radius:8px;
    background:#f9f9f9;
    font-size:15px;
}

button{
    margin-top:20px;
    width:100%;
    padding:14px;
    background:#7a0019;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#a00022;
}

.result{
    margin-top:30px;
    padding:20px;
    border-radius:10px;
    background:#f3f5f8;
    min-height:100px;
}

.student-card{
    padding:12px;
    margin-top:12px;
    background:white;
    border-left:5px solid #7a0019;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.footer{
    text-align:center;
    margin:30px;
    color:#555;
    font-size:14px;
}

</style>
</head>

<body>

<div class="header">

<svg class="logo" viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" fill="#ffcc00" stroke="#ffffff" stroke-width="5"/>
<text x="50%" y="57%" text-anchor="middle"
font-size="28"
fill="#7a0019"
font-weight="bold"
font-family="Arial">KVS</text>
</svg>

<div>
<div class="title">
Kendriya Vidyalaya Sangathan
</div>

<div class="subtitle">
CBSE Class 12 Result Analyser
</div>
</div>

</div>

<div class="container">

<h2>Upload CBSE Gazette TXT File</h2>

<input type="file" id="fileInput" accept=".txt">

<button onclick="sendData()">
Analyse Result
</button>

<div class="result" id="resultBox">
Upload TXT file and click Analyse Result.
</div>

</div>

<div class="footer">
Developed for Kendriya Vidyalaya Sangathan
</div>

<script>

async function sendData() {

    const resultBox = document.getElementById("resultBox");
    const fileInput = document.getElementById("fileInput");

    if (fileInput.files.length === 0) {

        resultBox.innerHTML =
        "Please choose a TXT file first.";

        return;
    }

    let formData = new FormData();

    formData.append("file", fileInput.files[0]);

    resultBox.innerHTML =
    "Processing CBSE result file...";

    try {

        const response = await fetch(
            "https://back-end-cbse-class12-result-analyser-1.onrender.com/predict",
            {
                method: "POST",
                body: formData
            }
        );

        const data = await response.json();

        console.log(data);

        if (data.success) {

            let html = `

            <h2 style="color:green;">
            Analysis Successful ✅
            </h2>

            <p>
            <b>School PI:</b>
            ${data.school_pi}
            </p>

            <p>
            <b>Total Students:</b>
            ${data.total_students}
            </p>

            <hr>

            <h3>
            Student Performance Index Details
            </h3>
            `;

            data.students.forEach((student, index) => {

                html += `

                <div class="student-card">

                <b>
                ${index + 1}. ${student.name}
                </b>

                <br><br>

                Roll Number:
                ${student.roll}

                <br>

                Performance Index (PI):
                <b>${student.pi}</b>

                </div>
                `;
            });

            resultBox.innerHTML = html;

        } else {

            resultBox.innerHTML =
            "<span style='color:red;'>❌ "
            + data.message +
            "</span>";

        }

    } catch (error) {

        console.log(error);

        resultBox.innerHTML =
        "<span style='color:red;'>❌ Error connecting to backend API</span>";
    }
}

</script>

</body>
</html>
