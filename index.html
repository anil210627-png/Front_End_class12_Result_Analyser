<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KVS CBSE PI Calculator</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f3f5f9;
}

/* Header */

.header{
    background:#7a0019;
    color:white;
    padding:20px;
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    width:70px;
    height:70px;
    background:#ffcc00;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:#7a0019;
    font-size:22px;
}

.title{
    font-size:28px;
    font-weight:bold;
}

/* Main Container */

.container{
    max-width:1200px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* Upload Section */

.upload-box{
    margin-top:20px;
}

input[type="file"]{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    background:#fafafa;
    cursor:pointer;
}

button{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#7a0019;
    color:white;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#990022;
}

/* Summary Cards */

.card-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:#f8f9fc;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.card h2{
    margin:0;
    color:#7a0019;
    font-size:34px;
}

.card p{
    margin-top:10px;
    color:#555;
    font-size:16px;
}

/* Table */

.table-container{
    overflow-x:auto;
    margin-top:35px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#7a0019;
    color:white;
    padding:12px;
}

table td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

table tr:hover{
    background:#f2f2f2;
}

/* Footer */

.footer{
    margin-top:40px;
    text-align:center;
    color:#666;
    font-size:14px;
}

.loading{
    margin-top:20px;
    font-size:18px;
    color:#7a0019;
    font-weight:bold;
}

</style>

</head>

<body>

<!-- Header -->

<div class="header">

<div class="logo">
KVS
</div>

<div class="title">
Kendriya Vidyalaya Sangathan - CBSE Result PI Calculator
</div>

</div>

<!-- Main Container -->

<div class="container">

<h2>Upload CBSE TXT Result File</h2>

<div class="upload-box">

<input
type="file"
id="fileInput"
accept=".txt"
>

<button onclick="uploadFile()">
Calculate PI
</button>

</div>

<div id="loading"></div>

<!-- Summary Cards -->

<div id="summary"></div>

<!-- Result Table -->

<div class="table-container">

<table id="resultTable">

</table>

</div>

<div class="footer">
Developed for Kendriya Vidyalaya Sangathan
</div>

</div>

<script>

async function uploadFile(){

    const fileInput =
    document.getElementById("fileInput");

    const loading =
    document.getElementById("loading");

    if(fileInput.files.length === 0){

        alert("Please select TXT file");

        return;
    }

    const formData = new FormData();

    formData.append(
        "file",
        fileInput.files[0]
    );

    loading.innerHTML =
    "Processing file... Please wait ⏳";

    try{

        const response =
        await fetch(
            "http://127.0.0.1:5000/predict",
            {
                method:"POST",
                body:formData
            }
        );

        const data =
        await response.json();

        loading.innerHTML = "";

        if(!data.success){

            alert(
                "Error processing file"
            );

            return;
        }

        // Summary Cards

        document.getElementById(
            "summary"
        ).innerHTML = `

        <div class="card-container">

            <div class="card">
                <h2>${data.school_pi}</h2>
                <p>School PI</p>
            </div>

            <div class="card">
                <h2>${data.total_subjects}</h2>
                <p>Total Subjects</p>
            </div>

            <div class="card">
                <h2>${data.subjects.length}</h2>
                <p>Subject Entries</p>
            </div>

            <div class="card">
                <h2>100%</h2>
                <p>Pass Rate</p>
            </div>

        </div>

        `;

        // Build Table

        let table = `

        <tr>

            <th>Code</th>
            <th>Subject</th>
            <th>Total</th>
            <th>A1</th>
            <th>A2</th>
            <th>B1</th>
            <th>B2</th>
            <th>C1</th>
            <th>C2</th>
            <th>D</th>
            <th>E</th>
            <th>PI</th>
            <th>Pass %</th>

        </tr>

        `;

        for(let item of data.subjects){

            table += `

            <tr>

                <td>${item.code}</td>

                <td>${item.subject}</td>

                <td>${item.total}</td>

                <td>${item.A1}</td>

                <td>${item.A2}</td>

                <td>${item.B1}</td>

                <td>${item.B2}</td>

                <td>${item.C1}</td>

                <td>${item.C2}</td>

                <td>${item.D}</td>

                <td>${item.E}</td>

                <td>${item.PI}</td>

                <td>${item.PassPercent}</td>

            </tr>

            `;
        }

        document.getElementById(
            "resultTable"
        ).innerHTML = table;

    }
    catch(error){

        loading.innerHTML = "";

        alert(
            "Error connecting to backend API"
        );

        console.log(error);
    }

}

</script>

</body>
</html>
