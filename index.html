<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KVS Class 12 Result Analyser</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#eef2f7;
}

.header{
    background:#7a0019;
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
}

.logo{
    width:70px;
    height:70px;
    margin-right:15px;
}

.title{
    font-size:28px;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

input[type=file]{
    margin-top:15px;
    margin-bottom:20px;
    padding:10px;
    width:100%;
    border:1px solid #ccc;
    border-radius:8px;
    background:#fafafa;
}

button{
    background:#7a0019;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#a00022;
}

.result{
    margin-top:25px;
    background:#f4f6fa;
    padding:20px;
    border-radius:10px;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

table th{
    background:#7a0019;
    color:white;
    padding:10px;
    border:1px solid #ddd;
}

table td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}

.schoolpi{
    font-size:22px;
    font-weight:bold;
    color:green;
    margin-top:20px;
}

.footer{
    text-align:center;
    padding:20px;
    color:#666;
    font-size:14px;
}

.status{
    font-weight:bold;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="header">

<svg class="logo" viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" fill="#ffcc00" stroke="white" stroke-width="5"/>
<text x="50%" y="58%" text-anchor="middle" font-size="28" fill="#7a0019" font-weight="bold">KVS</text>
</svg>

<div class="title">
Kendriya Vidyalaya Sangathan<br>
CBSE Class 12 Result Analyser
</div>

</div>

<div class="container">

<h2>Upload CBSE Gazette TXT File</h2>

<input type="file" id="fileInput" accept=".txt">

<button onclick="uploadFile()">Calculate PI</button>

<div class="status" id="status"></div>

<div class="result" id="result">
Result will appear here...
</div>

</div>

<div class="footer">
Developed for Kendriya Vidyalaya Sangathan
</div>

<script>

async function uploadFile(){

    const fileInput = document.getElementById("fileInput");
    const status = document.getElementById("status");
    const resultDiv = document.getElementById("result");

    if(fileInput.files.length === 0){
        alert("Please choose a TXT file");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    status.innerHTML = "Processing file...";

    try{

        const response = await fetch(
            "https://back-end-cbse-class12-result-analyser-1.onrender.com/predict",
            {
                method:"POST",
                body:formData
            }
        );

        const data = await response.json();

        console.log(data);

        if(data.success){

            status.innerHTML = "Prediction Successful ✅";

            let html = "";

            html += `
            <div class="schoolpi">
            School PI : ${data.school_pi}
            </div>
            `;

            html += `
            <table>
            <tr>
                <th>Subject</th>
                <th>Subject PI</th>
            </tr>
            `;

            data.subject_wise_pi.forEach(item => {

                html += `
                <tr>
                    <td>${item.subject}</td>
                    <td>${item.pi}</td>
                </tr>
                `;

            });

            html += `</table>`;

            resultDiv.innerHTML = html;

        }
        else{

            status.innerHTML = "Error in processing file ❌";
            resultDiv.innerHTML = data.error;

        }

    }
    catch(error){

        console.log(error);

        status.innerHTML = "Error connecting to backend API ❌";

        resultDiv.innerHTML = error;

    }

}

</script>

</body>
</html>
